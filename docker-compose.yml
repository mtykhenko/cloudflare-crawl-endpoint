version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crawl-site-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - crawl-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: crawl-site-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - crawl-network
    restart: unless-stopped

networks:
  crawl-network:
    driver: bridge
    name: crawl-site-network
